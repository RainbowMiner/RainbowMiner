<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 id="title" data-navbaractive="navjsoneditor" class="h2">JSON Editor</h1>
</div>

<link rel="stylesheet" href="/js/extensions/json-editor/json-viewer.css" />
<script src="/js/extensions/json-editor/json-viewer.js"></script>
<script src="/js/extensions/json-editor/json-editor.js"></script>

<form id="formConfig">
    <div class="card mb-3">
        <select id="select--ConfigName" name="ConfigName" class="form-control">
            <option>-- please select --</option>
            <option value="Algorithms">algorithms.config.txt</option>
            <option value="Coins">coins.config.txt</option>
            <option value="Combos">combos.config.txt</option>
            <option value="Config">config.txt</option>
            <option value="Devices">devices.config.txt</option>
            <option value="GpuGroups">gpugroups.config.txt</option>
            <option value="Miners">miners.config.txt</option>
            <option value="mrr">mrr.config.txt</option>
            <option value="mrralgorithms">mrralgorithms.config.txt</option>
            <option value="OCProfiles">ocprofiles.config.txt</option>
            <option value="Pools">pools.config.txt</option>
            <option value="Scheduler">scheduler.config.txt</option>
            <option value="Userpools">userpools.config.txt</option>
        </select>
    </div>
    <div class="card mb-3" id="jsonEditor">
        <textarea id="json-input" autocomplete="off" name="Data" class="form-control"></textarea>
        <pre id="json-display"></pre>
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
</form>

<script type="text/javascript">

var editor = null;

document.addEventListener("DOMContentLoaded", () => {
    ConfigLoader.whenReady().then(function(cfg) {

        const jsonEditorCard = document.getElementById("jsonEditor");
        const jsonInput = document.getElementById("json-input");
        const jsonDisplay = document.getElementById("json-display");
        const form = document.getElementById("formConfig");

        function showModal(bodyHtml, title) {
            document.querySelector('.modal-body').innerHTML = bodyHtml;
            document.querySelector('.modal-title').textContent = title;
            bootstrap.Modal.getOrCreateInstance(document.getElementById('myModal')).show();
        }

        jsonEditorCard.hidden = true;
        jsonInput.hidden = true;

        document.getElementById("select--ConfigName").addEventListener("change", async () => {
            const name = document.getElementById("select--ConfigName").value;

            jsonInput.value = "";
            jsonDisplay.replaceChildren();

            if (name.slice(-1)=='-') {
                jsonEditorCard.hidden = true;
                return;
            }
            try {
                const response = await fetch('/loadconfigjson?' + new URLSearchParams({ ConfigName: name }));
                const result = await response.json();
                if (result.Success) {
                    try {
                        var data = JSON.parse(result.Data);
                        jsonInput.value = result.Data;
                        editor = new JsonEditor('#json-display', data, {defaultCollapsed:true,rootCollapsable:false});
                        jsonEditorCard.hidden = false;
                    } catch (ex) {
                        alert('Wrong JSON Format: ' + ex);
                    }
                }
            } catch (error) {
                console.error("loadconfigjson:", error);
            }
        });

        form.addEventListener("submit", async (event) => {
            // Stop form from submitting normally
            event.preventDefault();

            var text;
            try {
                text = editor.text()
                JSON.parse(text)
                jsonInput.value = text;
            } catch (ex) {
                var err = esc(""+ex);
                var pos = (""+ex).match(/position\s+(\d+)/);
                if (pos) {
                    pos = parseInt(pos[1])
                    var min = pos - 30;
                    var max = pos + 30;
                    if (min < 0) {
                        max -= min;
                        min=0;
                    }
                    if (max > text.length) {
                        max = text.length;
                    }
                    var eleft = Math.min(10, pos-min), eright = Math.min(10,max-pos-1);
                    var epos = pos-min-eleft;
                    err += '<pre>' + esc(text.substring(min,max)) + "\n" + (epos>0? " ".repeat(epos):'') + (eleft>0? "-".repeat(eleft):'') + '^' + (eright>0? "-".repeat(eright):'') + '</pre>';
                }
                showModal(err, 'Error in JSON format');
                return;
            }

            if (cfg.IsLocked) {
                showModal('To be able to save, manually set parameter "APIlockConfig" to "0" in config.txt', 'Warning: config lock is enabled');
                return;
            }
            try {
                const response = await fetch("/saveconfigjson", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
                    body: new URLSearchParams(new FormData(form)).toString()
                });
                const data = await response.json();
                if (data.Success) {
                    showModal('RainbowMiner will pick up the new configuration after the current round has ended.', 'Configuration saved!');
                } else {
                    showModal('Something went wrong or the configuration is locked via APILockConfig in config.txt', 'Configuration NOT saved!');
                }
            } catch (error) {
                console.error("saveconfigjson:", error);
            }
        })
    });
});
</script>
