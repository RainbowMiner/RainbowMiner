<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 id="title" data-navbaractive="navsetuppools" class="h2">Setup Pools</h1>
</div>

<form id="formConfig">
    <input type="hidden" name="ConfigName" value="Pools">

    <!-- Dropdown -->
    <div class="mb-3">
        <select id="select--PoolName" name="PoolName" class="form-select">
            <option>-- please select --</option>
        </select>
    </div>

    <!-- Accordion -->
    <div class="accordion" id="accordion"></div>
</form>


<!-- End of page scripts -->
<script src="/js/rbm-setup-1.0.js"></script>
<script type="text/javascript">

// --- Structural renderers (field rendering is schema-driven via RbmSetup) ---

function renderPoolCoin(c) {
    if (c.isNew) {
        return `<div class="mb-3 row">
                    <label for="inputAddNewCoin" class="col-sm-2 col-form-label">Add New Coin</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="inputAddNewCoin" name="AddNewCoin" placeholder="Symbol of new coin">
                    </div>
                    <label for="inputAddNewCoinWallet" class="col-sm-2 col-form-label">Add Wallet for New Coin</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="inputAddNewCoinWallet" name="AddNewCoinWallet" placeholder="Wallet address of new coin, use $ for coins in coins.config.txt">
                    </div>
                    <label for="inputAddNewCoinParams" class="col-sm-2 col-form-label">Add Params for New Coin</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="inputAddNewCoinParams" name="AddNewCoinParams" placeholder="Additional password parameters of new coin">
                    </div>
                </div>`;
    }
    const coin = esc(c.coin);
    return `<div class="mb-3 row">
                <label for="input${coin}" class="col-sm-2 col-form-label">${coin}</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="input${coin}" name="${coin}" placeholder="${coin} Wallet address" value="${esc(c.wallet)}">
                </div>
                <label for="input${coin}-Params" class="col-sm-2 col-form-label">${coin}-Params</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="input${coin}-Params" name="${coin}-Params" placeholder="Additional password field parameters for ${coin}" value="${esc(c.params)}">
                </div>
            </div>`;
}

function renderPoolAccordionSection(id, heading, label, bodyHtml, expanded) {
    return `<div class="accordion-item" id="config--${id}">
        <h2 class="accordion-header" id="heading${heading}">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${heading}" aria-expanded="true" aria-controls="collapse${heading}">
                ${label}
            </button>
        </h2>
        <div id="collapse${heading}" class="accordion-collapse collapse" aria-labelledby="heading${heading}" data-bs-parent="#accordion">
            <div class="accordion-body">${bodyHtml}</div>
        </div>
    </div>`;
}

function renderPoolSetup(item) {
    return renderPoolAccordionSection("Coins", "Coins", "Coins", item.coins.map(renderPoolCoin).join(''))
         + renderPoolAccordionSection("Common", "Common", "Common", item.common.join(''))
         + renderPoolAccordionSection("Specific", "Specific", "Specific", item.specific.join(''))
         + `<div class="accordion-item">
        <div class="accordion-body text-center">
            <button type="submit" class="btn btn-primary">Submit</button>
        </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", () => {

    ConfigLoader.whenReady().then(async function(cfg) {
        const poolSelect = document.getElementById("select--PoolName");
        const accordion = document.getElementById("accordion");

        // field definitions, type rules and number limits (Phase 5)
        let poolschema = null;
        try {
            const schemaResponse = await fetch('/data/setupschema.json');
            poolschema = (await schemaResponse.json()).pools;
        } catch (error) {
            console.error("setupschema:", error);
            return;
        }

        // build one field record from key/help/value using the schema rules
        function poolFieldRec(key, help, value) {
            const rec = { key: key, id: "input" + key, name: key, help: help, value: value, type: "text" };
            const rtype = RbmSetup.ruleType(key, poolschema.rules);
            if (rtype) {
                rec.type = rtype;
            } else if (typeof poolschema.limits[key] !== "undefined") {
                const lim = poolschema.limits[key];
                rec.min = lim.min;
                rec.max = lim.max;
                rec.step = lim.step;
                rec.append = lim.append;
                rec.inputmode = "decimal";
                if (lim.min !== null || lim.max !== null || lim.step !== null) rec.type = "number";
            }
            return rec;
        }

        try {
            const response = await fetch('/loadconfig?' + new URLSearchParams({ ConfigName: "Pools", PoolName: "list" }));
            const result = await response.json();
            result.sort();
            var add1 = '', add2 = '';
            for (let name of result) {
                const sel = (name.slice(-1)=='*')? true:false;
                if (sel) name = name.slice(0,-1);
                const aesym = (typeof cfg.AutoexPools[name] !== "undefined")? ' <span class="crypto-symbol bitcoin-symbol">&#x20BF;</span>':'';
                const opt = '<option value="'+esc(name)+'">'+esc(name)+aesym+'</option>';
                if (sel) add1 += opt; else add2 += opt;
            }
            poolSelect.insertAdjacentHTML("beforeend", add1 + '<option>--------</option>' + add2);
        } catch (error) {
            console.error("pool list:", error);
        }

        poolSelect.addEventListener("change", async () => {
            var name = poolSelect.value
            if (name.slice(-1)=='-') {
                accordion.replaceChildren();
            }
            else {
                try {
                    const response = await fetch('/loadconfig?' + new URLSearchParams({ ConfigName: "Pools", PoolName: name }));
                    const result = await response.json();
                    {
                        if (result.PoolName == name) {
                            var coins = []
                            var item = {
                                poolname: result.PoolName,
                                coins: [],
                                common: [],
                                specific: []
                            }

                            var isYiimp = typeof result.Setup !== "undefined" && result.Setup != null && result.Setup.Yiimp
                            for (const [key, help] of Object.entries(poolschema.fields)) {
                                if (typeof result.Config[key] === "undefined") continue
                                if (poolschema.exclude.always.indexOf(key) > -1) continue
                                if (isYiimp && poolschema.exclude.yiimp.indexOf(key) > -1) continue

                                item.common.push(RbmSetup.renderConfigField(poolFieldRec(key, help, result.Config[key])))
                            }

                            for (let [key, val] of Object.entries(result.Config)) {
                                if (typeof poolschema.fields[key] !== "undefined") continue
 
                                var hasSetupField = typeof result.Setup !== "undefined" && result.Setup != null && typeof result.Setup.SetupFields !== "undefined" && typeof result.Setup.Fields[key] !== "undefined"

                                if (!hasSetupField && (key.length <= 5 || key.match(/-Params$/))) {
                                    if (key.match(/-Params$/)) {
                                        key = key.replace(/-Params$/,"")
                                    }
                                    if (-1 == coins.indexOf(key)) {
                                        item.coins.push({coin:key, wallet:result.Config[key], params:result.Config[key+'-Params']})
                                        coins.push(key)
                                    }
                                } else if (hasSetupField) {
                                    item.specific.push(RbmSetup.renderConfigField(poolFieldRec(key, result.Setup.SetupFields[key], result.Config[key])))
                                } else {
                                    console.log("Unrelated config field found in "+result.PoolName+": "+key)
                                }
                            }
                            if (item.coins.length) {
                                item.coins.push({coin:"", wallet:"", isNew:true})
                            }

                            accordion.innerHTML = renderPoolSetup(item);

                            var frst = "collapseCoins"
                            if (!item.coins.length) {
                                rbmToggleDisplay("#config--Coins", false)
                                frst = "collapseCommon"
                            }
                            if (!item.specific.length) {
                                rbmToggleDisplay("#config--Specific", false)
                            }
                            document.getElementById(frst).classList.add("show")
                        }
                    }
                } catch (error) {
                    console.error("loadconfig:", error);
                }
            }
        });

        document.getElementById("formConfig").addEventListener("submit", (event) => {
            // Stop form from submitting normally
            event.preventDefault();
            rbmSubmitConfig(event.target, cfg, () => {
                poolSelect.dispatchEvent(new Event("change"));
            });
        });
    });
});
</script>
