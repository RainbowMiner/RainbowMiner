<!--#include file="/parts/head.html" -->
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 id="title" data-navbaractive="navsetupcoins" class="h2">Setup Coins</h1>
</div>

<form id="formConfig">
    <input type="hidden" name="ConfigName" value="Coins">

    <!-- Accordion -->
    <div class="accordion" id="accordion"></div>
</form>




<!-- End of page scripts -->
<script type="text/javascript">

// Render one form field row (replaces the Handlebars coinsetup_template fields)
function renderCoinField(f) {
    const id = esc(f.coinsymbol) + '--input' + esc(f.key);
    const name = esc(f.coinsymbol) + '--' + esc(f.key);
    if (f.type == "bool") {
        return `<div class="mb-3 row">
                    <label for="${id}" class="col-sm-2 col-form-label">${esc(f.key)}</label>
                    <div class="col-sm-10">
                        <select class="form-select" id="${id}" name="${name}">
                            <option value="0"${f.value == "0" ? " selected" : ""}>Disable</option>
                            <option value="1"${f.value == "1" ? " selected" : ""}>Enable</option>
                        </select>
                        <div class="form-text">${esc(f.text)}</div>
                    </div>
                </div>`;
    }
    if (f.type == "checkbox") {
        return `<div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="${id}" name="${name}" value="${esc(f.value)}"${f.checked ? " checked" : ""}>
                    <label class="form-check-label" for="${id}">${esc(f.text)}</label>
                </div>`;
    }
    return `<div class="mb-3 row">
                <label for="${id}" class="col-sm-2 col-form-label">${esc(f.key)}</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" id="${id}" name="${name}" value="${esc(f.value)}">
                    <div class="form-text">${esc(f.text)}</div>
                </div>
            </div>`;
}

// Render one coin accordion item (replaces the Handlebars coinsetup_template)
function renderCoinItem(item) {
    const sym = esc(item.coinsymbol);
    return `<div class="accordion-item">
        <h2 class="accordion-header" id="heading${sym}">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${sym}" aria-expanded="false" aria-controls="collapse${sym}">
                ${esc(item.title)}
            </button>
        </h2>
        <div id="collapse${sym}" class="accordion-collapse collapse" aria-labelledby="heading${sym}" data-bs-parent="#accordion">
            <div class="accordion-body">
                <input type="hidden" name="Coins[]" value="${sym}">
                ${item.common.map(renderCoinField).join('')}
            </div>
        </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", () => {

    ConfigLoader.whenReady().then(function(cfg) {

        async function loadconfig() {
            const accordion = document.getElementById('accordion');
            accordion.replaceChildren();
            try {
                const response = await fetch('/loadconfig?' + new URLSearchParams({ ConfigName: "Coins" }));
                const result = await response.json();
                {
                    var common = {
                        Wallet: "Enter global wallet address (optional, will substitute string \"\${{coinsymbol}}\" in pools.config.txt)",
                        Penalty: "Enter penalty in percent. This value will decrease all reported values.",
                        MinHashrate: "Enter minimum hashrate at a pool (units allowed, e.g. 12GH)",
                        MinWorkers: "Enter minimum amount of workers at a pool (units allowed, e.g. 5k)",
                        MaxTimeToFind: "Enter maximum average time to find a block (units allowed, e.h. 1h=one hour, default unit is s=seconds)",
                        MinProfitPercent: "Enter allowed minimum profit for post block mining (in percent of best miner's profit)",
                        EnableAutoPool: "Automatically enable \"{{coinsymbol}}\" for pools activated in pools.config.txt with EnableAutoCoin=\"1\"",
                        PostBlockMining: "Enter timespan to force mining, after a block has been found at enabled pools (units allowed, e.h. 1h=one hour, default unit is s=seconds)",
                        Comment: "Optionally enter a comment (e.g. name of exchange)"
                    }

                    const html = [];

                    var item = {
                        title: "Enter a new coin",
                        coinsymbol: "Newcoin",
                        common: [{coinsymbol:"Newcoin",key:"CoinSymbol",text:"Enter a valid coin symbol (no spaces!)",value:"",type:"text"}]
                    }
                    for (const [key, val] of Object.entries(common)) {
                        item.common.push({coinsymbol:item.coinsymbol,key:key,text:val.replace(/{{coinsymbol}}/,'???'),value:"",type:key.match(/Enable|Disable/)? "bool":"text"})
                    }
                    html.push(renderCoinItem(item));

                    for (const [coinsymbol, data] of Object.entries(result)) {
                        var citem = {
                            title: coinsymbol,
                            coinsymbol: coinsymbol,
                            common: []
                        }
                        for (const [key, val] of Object.entries(common)) {
                            if (typeof data[key] !== "undefined") {
                                citem.common.push({coinsymbol:citem.coinsymbol,key:key,text:val.replace(/{{coinsymbol}}/,citem.coinsymbol),value:data[key],type:key.match(/Enable|Disable/)? "bool":"text"})
                            }
                        }
                        citem.common.push({coinsymbol:citem.coinsymbol,key:"RemoveCoin",text:"remove coin",value:"1",type:"checkbox"})

                        html.push(renderCoinItem(citem));
                    }
                    html.push('<div class="accordion-item"><div class="accordion-body text-center"><button type="submit" class="btn btn-primary">Submit</button></div></div>');
                    accordion.innerHTML = html.join('');
                }
            } catch (error) {
                console.error("loadconfig:", error);
            }
        }

        loadconfig();

        document.getElementById("formConfig").addEventListener("submit", (event) => {
            // Stop form from submitting normally
            event.preventDefault();
            rbmSubmitConfig(event.target, cfg, loadconfig);
        });
    });
});
</script>
