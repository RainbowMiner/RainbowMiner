<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 id="title" data-navbaractive="navsetupcoins" class="h2">Setup Coins</h1>
</div>

<form id="formConfig">
    <input type="hidden" name="ConfigName" value="Coins">

    <!-- Accordion -->
    <div class="accordion" id="accordion"></div>
</form>




<!-- End of page scripts -->
<script src="/js/rbm-setup-1.0.js"></script>
<script type="text/javascript">

// Render one coin config field (definitions come from /data/setupschema.json)
function renderCoinField(f) {
    const id = esc(f.coinsymbol) + '--input' + esc(f.key);
    const name = esc(f.coinsymbol) + '--' + esc(f.key);
    if (f.type == "checkbox") {
        return `<div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="${id}" name="${name}" value="${esc(f.value)}"${f.checked ? " checked" : ""}>
                    <label class="form-check-label" for="${id}">${esc(f.text)}</label>
                </div>`;
    }
    return RbmSetup.renderConfigField({
        key: f.key, id: id, name: name, help: f.text, value: f.value, type: f.type
    });
}

// Render one coin accordion item (replaces the Handlebars coinsetup_template)
function renderCoinItem(item) {
    const sym = esc(item.coinsymbol);
    return `<div class="accordion-item">
        <h2 class="accordion-header" id="heading${sym}">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${sym}" aria-expanded="false" aria-controls="collapse${sym}">
                ${esc(item.title)}
            </button>
        </h2>
        <div id="collapse${sym}" class="accordion-collapse collapse" aria-labelledby="heading${sym}" data-bs-parent="#accordion">
            <div class="accordion-body">
                <input type="hidden" name="Coins[]" value="${sym}">
                ${item.common.map(renderCoinField).join('')}
            </div>
        </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", () => {

    ConfigLoader.whenReady().then(function(cfg) {

        async function loadconfig() {
            const accordion = document.getElementById('accordion');
            accordion.replaceChildren();
            try {
                const [schemaResponse, response] = await Promise.all([
                    fetch('/data/setupschema.json'),
                    fetch('/loadconfig?' + new URLSearchParams({ ConfigName: "Coins" }))
                ]);
                const coinschema = (await schemaResponse.json()).coins;
                const result = await response.json();
                {
                    const fieldType = (key) => RbmSetup.ruleType(key, coinschema.rules) || "text";

                    const html = [];

                    var item = {
                        title: "Enter a new coin",
                        coinsymbol: "Newcoin",
                        common: [{coinsymbol:"Newcoin",key:coinschema.newcoin.key,text:coinschema.newcoin.help,value:"",type:"text"}]
                    }
                    for (const [key, val] of Object.entries(coinschema.fields)) {
                        item.common.push({coinsymbol:item.coinsymbol,key:key,text:val.replace(/{{coinsymbol}}/,'???'),value:"",type:fieldType(key)})
                    }
                    html.push(renderCoinItem(item));

                    for (const [coinsymbol, data] of Object.entries(result)) {
                        var citem = {
                            title: coinsymbol,
                            coinsymbol: coinsymbol,
                            common: []
                        }
                        for (const [key, val] of Object.entries(coinschema.fields)) {
                            if (typeof data[key] !== "undefined") {
                                citem.common.push({coinsymbol:citem.coinsymbol,key:key,text:val.replace(/{{coinsymbol}}/,citem.coinsymbol),value:data[key],type:fieldType(key)})
                            }
                        }
                        citem.common.push({coinsymbol:citem.coinsymbol,key:coinschema.remove.key,text:coinschema.remove.help,value:"1",type:"checkbox"})

                        html.push(renderCoinItem(citem));
                    }
                    html.push('<div class="accordion-item"><div class="accordion-body text-center"><button type="submit" class="btn btn-primary">Submit</button></div></div>');
                    accordion.innerHTML = html.join('');
                }
            } catch (error) {
                console.error("loadconfig:", error);
            }
        }

        loadconfig();

        document.getElementById("formConfig").addEventListener("submit", (event) => {
            // Stop form from submitting normally
            event.preventDefault();
            rbmSubmitConfig(event.target, cfg, loadconfig);
        });
    });
});
</script>
