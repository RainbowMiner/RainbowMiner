<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 id="title" data-navbaractive="navconsole" class="h2">Console</h1>
</div>
<div class="card-group mb-4">
    <div class="card">
        <div class="card-header">
            <div id="cmdmenu"></div>
        </div>
        <div class="card-body small">
            <pre id="console">
            </pre>
        </div>
    </div>
</div>

<div id="miners">
    <h3 class="mt-4 h-selector" id="h-minerboxes">Running Miners</a></h3>
    <div id="minerboxes" class="card-deck"></div>
</div>

<!-- End of page scripts -->
<template id="miner_template">
    <div class="mb-2 card" style="min-width: 400px">
        <div class="card-header">
            <h5></h5>
        </div>
        <div class="card-body small">
            <pre></pre>
        </div>
    </div>
</template>

<script type="text/javascript">

var cmdkey = '';
var cmdts  = 0;

function setButtonColors() {
    for (const btn of document.querySelectorAll(".cmdkey")) {
        const key = btn.dataset.key;
        const cl = cmdkey == key? 'bg-success' : (cmdkey == ''? '' : 'bg-secondary')
        btn.classList.remove('bg-success', 'bg-secondary');
        if (cl != '') btn.classList.add(cl);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const template = document.getElementById("miner_template");
    const cmdmenu = document.getElementById("cmdmenu");
    const minerboxes = document.getElementById("minerboxes");
    const miners = document.getElementById("miners");

    // one delegated handler instead of re-binding buttons on every poll
    cmdmenu.addEventListener("click", async (event) => {
        const btn = event.target.closest(".cmdkey");
        if (!btn) return;
        event.stopPropagation();
        if (cmdkey == '') {
            cmdkey = btn.dataset.key;
            var confirm_msg = "";
            if (cmdkey == "CTRL-U") { confirm_msg = "Careful!\nUpdating to the latest pre-release is NOT without risk.\nDo you really want to proceed?" }
            else if (cmdkey == "X") { confirm_msg = "Really stop RainbowMiner now?" }
            if (confirm_msg != "" && !confirm(confirm_msg)) {
                cmdkey = '';
                return;
            }
            setButtonColors()
            try {
                await fetch('/cmdkey?CmdKey=' + encodeURIComponent(cmdkey));
            } catch (error) {
                console.error("cmdkey:", error);
            }
        }
    });

    rbmPoll("console", 5000, async () => {
            const response = await rbmFetch('/console?ts=' + cmdts);
            const result = await response.json();

            cmdkey = result.CmdKey.toUpperCase()
            cmdts  = result.Timestamp

            cmdmenu.replaceChildren();
            for (const item of result.CmdMenu) {
                const k = item.match(/\[([A-Za-z\-]+)\]/)
                if (k) {
                    const btn = document.createElement("button");
                    btn.className = "cmdkey";
                    btn.dataset.key = k[1].toUpperCase();
                    btn.textContent = item;
                    cmdmenu.append(btn, " ");
                }
            }
            setButtonColors()

            if (result.Content != '*') {
                document.getElementById("console").textContent = result.Content;
            }

            minerboxes.replaceChildren();
            if (result.Miners && result.Miners.length) {
                for (const item of result.Miners) {
                    const box = template.content.cloneNode(true);
                    box.querySelector("h5").textContent = item.Name;
                    box.querySelector("pre").textContent = item.Content;
                    minerboxes.appendChild(box);
                }
            }
            miners.hidden = !(result.Miners && result.Miners.length);
        });
});
</script>
