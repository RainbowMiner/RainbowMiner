<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 id="title" data-navbaractive="navsetup" class="h2">Setup</h1>
</div>
<div class="alert alert-info" role="none" id="loadingMessage">Loading, please wait ...</div>

<form id="formConfig" class="d-none"></form>

<script src="/js/rbm-setup-1.0.js"></script>

<!-- End of page scripts -->
<script type="text/javascript">
function update_heatmyflat() {
    var val = parseFloat(document.querySelector("input#inputEnableHeatMyFlat")?.value)
    if (!val) val = "Max. Profit"
    else if (val == 5) val = "Max. Revenue"
    else if (val == 10) val = "Max. Heat"
    else val = "Level " + (Math.round(val*10)/10)
    const out = document.querySelector("span#inputEnableHeatMyFlatValue");
    if (out) out.textContent = val;
}

function update_miningheatcontrol() {
    var val = parseFloat(document.querySelector("input#inputMiningHeatControl")?.value)
    if (!val) val = "Min. Heat"
    else if (val == 2) val = "Max. Profit"
    else if (val == 3) val = "Max. Revenue"
    else if (val == 5) val = "Max. Heat"
    else val = "Level " + (Math.round(val * 10) / 10)
    const out = document.querySelector("span#inputMiningHeatControlValue");
    if (out) out.textContent = val;
}

// build one inline checkbox for the pool/device/serverconfig pickers
function setupCheckbox(id, name, value, labelHtml, checked) {
    return '<div class="form-check form-check-inline"><input type="checkbox" class="form-check-input" id="' + esc(id) + '" name="' + name + '" value="' + esc(value) + '"' + (checked ? ' checked' : '') + '><label class="form-check-label" for="' + esc(id) + '">' + labelHtml + '</label></div>';
}

document.addEventListener("DOMContentLoaded", async () => {
    try {
        const response = await fetch("/data/setupschema.json");
        RbmSetup.render(document.getElementById("formConfig"), await response.json());
    } catch (error) {
        console.error("setupschema:", error);
        document.getElementById("loadingMessage").textContent = "Failed to load /data/setupschema.json";
        return;
    }

    ConfigLoader.whenReady().then(function(cfg) {
        var loaded = 0;

        function markLoaded() {
            loaded++;
            if (loaded >= 2) {
                document.getElementById("formConfig").classList.remove("d-none");
                document.getElementById("loadingMessage").classList.add("d-none");
            }
        }

        // wire a select's value to the visibility of a toggle class
        function bindToggle(selectId, className, predicate) {
            const el = document.getElementById(selectId);
            const apply = () => rbmToggleDisplay("." + className, predicate(el.value));
            el.addEventListener("change", apply);
            return apply;
        }

        (async () => {
            try {
                const response = await fetch('/loadconfig');
                const result = await response.json();

                for (const el of document.querySelectorAll("input.form-control,select.form-select,input.form-range")) {
                    var conf = el.id.replace(/^input/, "")
                    var res = '';
                    if (el.type == "password") {
                        if (result[conf] == "") {
                            rbmToggleDisplay("#help" + conf, false);
                        }
                    } else {
                        res = result[conf];
                    }
                    // a schema field may be missing from an older config.txt:
                    // jQuery's .val(undefined) silently did nothing - writing
                    // it would display and then SAVE a literal "undefined"
                    if (res === undefined || res === null) { res = ''; }
                    if (typeof res == "boolean") { res = res? 1:0 }
                    else if ((conf == "RunMode" || conf == "MiningMode") && typeof res == "string") { res = res.toLowerCase(); }
                    el.value = res;
                }

                update_miningheatcontrol()

                var pools = [], excludepools = []
                var resultPoolName = result.PoolName.split(/[,;]/), resultExcludePoolName = result.ExcludePoolName.split(/[,;]/);
                cfg.AvailPools.forEach(function(key) {
                    var checked = resultPoolName.some(item => item.toLowerCase() === key.toLowerCase());
                    var aesym = (typeof cfg.AutoexPools[key] !== "undefined")? ' <svg class="crypto-symbol"><use href="#'+esc(cfg.AutoexPools[key])+'-symbol"/></svg>':'';
                    pools.push(setupCheckbox('pool' + key, 'PoolName[]', key, esc(key) + aesym, checked))
                    checked = resultExcludePoolName.some(item => item.toLowerCase() === key.toLowerCase());
                    excludepools.push(setupCheckbox('excludepool' + key, 'ExcludePoolName[]', key, esc(key) + aesym, checked))
                })
                document.getElementById("pools").innerHTML = pools.join('');
                document.getElementById("excludepools").innerHTML = excludepools.join('');

                var serverconfigname = [];
                var resultServerConfigName = result.ServerConfigName.split(/[,;]/);
                ["algorithms","coins","config","miners","ocprofiles","pools","scheduler"].forEach(function (data) {
                    var checked = resultServerConfigName.some(item => item.toLowerCase() === data.toLowerCase());
                    serverconfigname.push(setupCheckbox('serverconfig' + data, 'ServerConfigName[]', data, esc(data), checked))
                })
                document.getElementById("serverconfigname").innerHTML = serverconfigname.join('');

                const applyToggles = [
                    bindToggle("inputAPIauth", "is--auth", v => v == "1"),
                    bindToggle("inputRunMode", "is--client", v => v == "client"),
                    bindToggle("inputEnableServerConfig", "is--serverconfig",
                        v => document.getElementById("inputRunMode").value == "client" && v == "1"),
                    bindToggle("inputEnableMinerStatus", "is--reporting", v => v == "1"),
                    bindToggle("inputEnableOCProfiles", "is--ocprofiles", v => v == "1"),
                    bindToggle("inputEnableFastlaneBenchmark", "is--fastlane", v => v == "1")
                ];

                function applyCpuToggle() {
                    const dev = document.querySelector("input[type=checkbox][name='DeviceName[]'][value='CPU']");
                    const exdev = document.querySelector("input[type=checkbox][name='ExcludeDeviceName[]'][value='CPU']");
                    rbmToggleDisplay('.is--cpu', dev && dev.checked && !(exdev && exdev.checked));
                }
                document.querySelector("input[type=checkbox][name='DeviceName[]'][value='CPU']")?.addEventListener("change", applyCpuToggle);
                document.querySelector("input[type=checkbox][name='ExcludeDeviceName[]'][value='CPU']")?.addEventListener("change", applyCpuToggle);

                applyToggles.forEach(apply => apply());

                markLoaded();
            } catch (error) {
                console.error("loadconfig:", error);
            }
        })();
        (async () => {
            try {
                const response = await fetch('/getdeviceconfig');
                const result = await response.json();

                var devices = [], excludedevices = [], cpuenabled = false, cpudisabled = false, maxthreads = 0
                for (const [key, data] of Object.entries(result)) {
                    devices.push(setupCheckbox('device' + key, 'DeviceName[]', data.Name, esc(data.Name), data.Selected))
                    excludedevices.push(setupCheckbox('excludedevice' + key, 'ExcludeDeviceName[]', data.Name, esc(data.Name), data.Excluded))
                    if (data.Name == 'CPU') {
                        if (data.Selected) cpuenabled = true;
                        if (data.Excluded) cpudisabled = true;
                        maxthreads = data.Threads;
                    }
                }
                document.getElementById("devices").innerHTML = devices.join('');
                document.getElementById("excludedevices").innerHTML = excludedevices.join('');
                rbmToggleDisplay('.is--cpu', cpuenabled && !cpudisabled);
                document.getElementById('inputCPUMiningThreads').setAttribute('max', maxthreads);
                markLoaded();
            } catch (error) {
                console.error("getdeviceconfig:", error);
            }
        })();
        document.getElementById("formConfig").addEventListener("submit", (event) => {
            // Stop form from submitting normally
            event.preventDefault();
            if (!cfg.IsLocked && document.getElementById("inputAPIlockConfig").value == "1") {
                if (!confirm("Warning: you are about to lock the config.\nYou will have to manually set parameter \"APIlockConfig\" to \"0\" in config.txt to reset this.\n\nDo you really want to proceed?"))
                    return;
            }
            rbmSubmitConfig(event.target, cfg);
        })
        document.getElementById("inputMiningHeatControl")?.addEventListener("change", update_miningheatcontrol);
    });
});
</script>
