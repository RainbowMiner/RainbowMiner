        </main>
      </div>
    </div>
  </body>
<script type="text/javascript">

function setTheme(val) {
    RbmTheme.set(val);
}

function updateProfitHead() {
    const profitEl = document.getElementById("profit");
    const earningsEl = document.getElementById("earnings");
    const sel = document.getElementById("profit_currency");
    const opt = sel.selectedOptions.length ? sel.selectedOptions[0] : null;
    if (!opt) return;

    var profit = profitEl.dataset.btc;
    var earnings = earningsEl.dataset.btc;

    selected_currency.currency = opt.value;
    selected_currency.rate     = parseFloat(opt.dataset.rate);

    if (selected_currency.currency == "BTC" || selected_currency.currency == "mBTC" || selected_currency.currency == "sat") {
        profitEl.textContent = formatBTC(profit,selected_currency.currency);
        earningsEl.textContent = formatBTC(earnings,selected_currency.currency);
    } else {
        profitEl.textContent = (parseFloat(profit) * selected_currency.rate).toFixed(2);
        earningsEl.textContent = (parseFloat(earnings) * selected_currency.rate).toFixed(2);
    }
    window.localStorage.setItem("currency", selected_currency.currency);
}

document.addEventListener("DOMContentLoaded", () => {
    // Set the active sidebar item
    const title = document.getElementById('title');
    if (title && title.dataset.navbaractive) {
        document.getElementById(title.dataset.navbaractive)?.classList.add('active');
    }

    // set the values in the header
    var remoteversion = '0.0.0.0';
    rbmToggleDisplay('#updatemsg-inner', false);

    const themeSel = document.getElementById('theme');
    themeSel.value = RbmTheme.get();
    themeSel.addEventListener('change', () => setTheme(themeSel.value));

    document.getElementById("updatenow").addEventListener("click", async (e) => {
        e.preventDefault();
        try {
            await fetch('/update');
            rbmShowModal('RainbowMiner will be updated to version '+remoteversion+'. Please be patient!', 'Update started');
            rbmToggleDisplay('#updatemsg', false);
        } catch (error) {
            console.error("update:", error);
        }
    });

    document.getElementById("profit_currency").addEventListener("change", updateProfitHead);

    start_uptime = Date.now();
    last_uptime  = 0;
    last_iso = '';

    rbmPoll("currentprofit", 10000, async () => {
            const response = await rbmFetch('/currentprofit');
            const result = await response.json();
            {
                if (!last_uptime || parseInt(result.Uptime.Seconds) < last_uptime) {
                    start_uptime = Date.now();
                    last_uptime = parseInt(result.Uptime.Seconds);
                }

                // #country--data/--flag only exist on the dashboard page -
                // the old jQuery code silently no-opped elsewhere, so guard here
                const cdata = document.getElementById("country--data");
                const cflag = document.getElementById("country--flag");
                if (cdata && cflag && result.RemoteIP && (last_iso != result.RemoteIP.country.code)) {
                    last_iso = result.RemoteIP.country.code;
                    cdata.replaceChildren(
                        document.createTextNode(result.RemoteIP.ip),
                        document.createElement("br"),
                        document.createTextNode(result.RemoteIP.country.name)
                    );
                    cflag.replaceChildren();
                    if (/^[a-z]{2}$/i.test(last_iso)) {
                        const img = document.createElement("img");
                        img.src = '/images/flags/' + last_iso.toLowerCase() + '.svg';
                        img.style.height = '32px';
                        cflag.appendChild(img);
                    }
                }

                const csel = document.getElementById("profit_currency");
                var currency = csel.options.length ? csel.value : window.localStorage.getItem("currency");
                if (!currency) { currency = "BTC"; }

                function upsertOption(value, label, rate) {
                    let opt = Array.from(csel.options).find(o => o.value === value);
                    if (!opt) {
                        opt = new Option(label, value);
                        csel.appendChild(opt);
                    }
                    opt.dataset.rate = rate;
                    if (currency == value) opt.selected = true;
                }

                var xchange = [];
                xchange.push("1 BTC");
                for (const [key, itm] of Object.entries(result.Rates)) {
                    if (key != "BTC") xchange.push(parseFloat(formatBTC(itm)).toFixed(2) + " " + key);
                    upsertOption(key, key + '/day', itm);
                    if (key == "BTC") {
                        upsertOption('mBTC', 'mBTC/day', itm*1000);
                        upsertOption('sat', 'sat/day', itm*1e8);
                    }
                }
                document.getElementById("exchangerates").textContent = xchange.join(" = ");

                document.getElementById("profit").dataset.btc = result.AllProfitBTC;
                document.getElementById("earnings").dataset.btc = result.AllEarnings_Avg;

                var cpuPower = parseFloat(result?.Power?.CPU);
                var gpuPower = parseFloat(result?.Power?.GPU);
                var powerOffset = parseFloat(result?.Power?.Offset);

                // Default to 0 if value is missing or not a number
                cpuPower = isNaN(cpuPower) ? 0 : cpuPower;
                gpuPower = isNaN(gpuPower) ? 0 : gpuPower;
                powerOffset = isNaN(powerOffset) ? 0 : powerOffset;

                var power = cpuPower + gpuPower;
                var powerunit = "W";
                if (power > 1000) {
                    power /= 1000;
                    powerunit = "kW";
                    power = power.toFixed(2);
                } else {
                    power = power.toFixed(0);
                }

                document.getElementById("power").innerHTML = power + powerunit + (powerOffset>0? "<small>+"+powerOffset.toFixed(0)+"W</small>":'');

                ConfigLoader.whenReady().then(function(cfg) {
                    if (cfg.Version) {
                        for (const span of document.querySelectorAll('.powerprice span')) {
                            span.textContent = result.PowerPrice + (cfg.PowerPriceCurrency ? ' ' + cfg.PowerPriceCurrency : '');
                        }
                        rbmToggleDisplay('.powerprice', cfg.UsePowerPrice);
                    }
                });

                updateProfitHead();
            }
        });

    (function q() {
        ConfigLoader.whenReady().then(function(cfg) {
            for (const el of document.querySelectorAll('.workername')) el.textContent = cfg.WorkerName;
            var version = formatVersion(cfg.Version)
            remoteversion = formatVersion(cfg.RemoteVersion)
            const versionEl = document.getElementById('version');
            if (versionEl) versionEl.textContent = 'v' + version;
            if (version < remoteversion) {
                const link = document.getElementById('updatelink');
                link.title = 'Show info about release v' + remoteversion;
                link.href = cfg.ManualURI;
                link.textContent = 'v' + remoteversion;
                rbmToggleDisplay('#updatemsg-inner', true);
            } else {
                rbmToggleDisplay('#updatemsg-inner', false);
            }
            rbmToggleDisplay(".is--linux", cfg.IsLinux);
            const navnetwork = document.querySelector('a#navnetwork')?.closest('li');
            if (navnetwork) navnetwork.style.display = (typeof cfg.IsServer !== "undefined" && cfg.IsServer) ? '' : 'none';
            setTimeout(q, 600000);
        });
    })();

    (function r() {
        document.getElementById('uptime').textContent = formatUptime(last_uptime + Math.round((Date.now() - start_uptime) / 1000));
        setTimeout(r, 1000);
    })();

    for (const el of document.querySelectorAll('[data-toggle="tooltip"]')) {
        bootstrap.Tooltip.getOrCreateInstance(el);
    }

    ConfigLoader.whenReady().then(function(cfg) {
        rbmToggleDisplay('#loading-msg', false);
        RbmTables.initAll();
    });
});
  
</script>
</html>
